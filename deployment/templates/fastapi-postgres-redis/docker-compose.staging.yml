# Docker Compose - Staging Overrides
# Stack: FastAPI + PostgreSQL + Redis

services:
  api:
    ports:
      - "${STAGING_PORT:-8002}:80"
    environment:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
      - WORKERS=4
    command: uvicorn main:app --host 0.0.0.0 --port 80 --workers 4
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    ports:
      - "${POSTGRES_STAGING_PORT:-5433}:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    ports:
      - "${REDIS_STAGING_PORT:-6381}:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
