# Docker Compose - Staging Overrides
# Stack: FastAPI + PostgreSQL + Redis

services:
  api:
    ports:
      - "${STAGING_PORT:-8002}:80"
    environment:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
      - WORKERS=4
    labels:
      - "project=${PROJECT_NAME}"
      - "environment=staging"
      - "service=api"
      - "cic.project=${PROJECT_NAME}"
      - "cic.env=staging"
      - "cic.service=api"
    command: uvicorn main:app --host 0.0.0.0 --port 80 --workers 4
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    ports:
      - "${POSTGRES_STAGING_PORT:-5433}:5432"
    labels:
      - "project=${PROJECT_NAME}"
      - "environment=staging"
      - "service=postgres"
      - "cic.project=${PROJECT_NAME}"
      - "cic.env=staging"
      - "cic.service=postgres"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    ports:
      - "${REDIS_STAGING_PORT:-6381}:6379"
    labels:
      - "project=${PROJECT_NAME}"
      - "environment=staging"
      - "service=redis"
      - "cic.project=${PROJECT_NAME}"
      - "cic.env=staging"
      - "cic.service=redis"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
