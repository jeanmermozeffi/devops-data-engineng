# Docker Compose - Base Configuration
# Stack: FastAPI + PostgreSQL + Redis
# Variables injectûˋes depuis .devops.yml via le CLI devops

services:
  api:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.${ENV:-dev}
      args:
        - BUILD_ENV=${ENV:-dev}
    image: ${IMAGE_NAME}:${ENV}-latest
    container_name: ${PROJECT_NAME}-api-${ENV}
    env_file:
      - ../.env.${ENV}
    volumes:
      # Secrets chiffrûˋs (si prûˋsents)
      - ../.env.key:/app/.env.key:ro
      - ../.env.${ENV}.encrypted:/app/.env.${ENV}.encrypted:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    labels:
      - "project=${PROJECT_NAME}"
      - "environment=${ENV}"
      - "service=api"
      - "cic.project=${PROJECT_NAME}"
      - "cic.env=${ENV}"
      - "cic.service=api"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}-postgres-${ENV}
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "project=${PROJECT_NAME}"
      - "environment=${ENV}"
      - "service=postgres"
      - "cic.project=${PROJECT_NAME}"
      - "cic.env=${ENV}"
      - "cic.service=postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}-redis-${ENV}
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "project=${PROJECT_NAME}"
      - "environment=${ENV}"
      - "service=redis"
      - "cic.project=${PROJECT_NAME}"
      - "cic.env=${ENV}"
      - "cic.service=redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    name: ${PROJECT_NAME}-${ENV}-network
    driver: bridge

volumes:
  postgres-data:
    driver: local
    name: ${PROJECT_NAME}-postgres-${ENV}-data
  redis-data:
    driver: local
    name: ${PROJECT_NAME}-redis-${ENV}-data
