# Docker Compose - Production Overrides
# Stack: FastAPI + PostgreSQL + Redis

services:
  api:
    ports:
      - "${PROD_PORT:-8000}:80"
    environment:
      - ENVIRONMENT=prod
      - LOG_LEVEL=INFO
      - WORKERS=4
    command: uvicorn main:app --host 0.0.0.0 --port 80 --workers 4
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  postgres:
    # Pas de port exposé en production (sécurité)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    command: postgres -c max_connections=200 -c shared_buffers=512MB

  redis:
    # Pas de port exposé en production (sécurité)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
