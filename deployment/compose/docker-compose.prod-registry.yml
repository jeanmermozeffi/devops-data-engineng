# ============================================================================
# Docker Compose - Surcharge PROD (Registry)
# ============================================================================
#
# USAGE:
#   ENV=prod docker-compose -f docker-compose.registry.yml -f docker-compose.prod-registry.yml up -d
#
# ============================================================================

services:
    __PROJECT_NAME__-api-__ENV__:
        ports:
            - "${PROD_PORT:-8000}:80"

        environment:
            - ENVIRONMENT=prod
            - LOG_LEVEL=INFO
            - RELOAD=false

        # Pas de DNS personnalisés - utilise les DNS du daemon Docker (resolver système)
        # Les DNS publics (1.1.1.1, 8.8.8.8) peuvent être bloqués par certains datacenters

        # Configuration Traefik (si utilisé)
        labels:
            - "project=${PROJECT_NAME}"
            - "environment=prod"
            - "service=api"
            - "cic.project=${PROJECT_NAME}"
            - "cic.env=prod"
            - "cic.service=api"
            - "traefik.enable=true"
            - "traefik.http.routers.${PROJECT_NAME}-api-prod.rule=Host(`${PROD_DOMAIN:-api.localhost}`)"
            - "traefik.http.routers.${PROJECT_NAME}-api-prod.entrypoints=websecure"
            - "traefik.http.routers.${PROJECT_NAME}-api-prod.tls.certresolver=letsencrypt"
            - "traefik.http.services.${PROJECT_NAME}-api-prod.loadbalancer.server.port=80"

        # Limites de ressources en production
        deploy:
            resources:
                limits:
                    cpus: '2'
                    memory: 2G
                reservations:
                    cpus: '1'
                    memory: 1G

    __PROJECT_NAME__-redis-__ENV__:
        # Port Redis non exposé en production (sécurité)
        ports: []
        labels:
            - "project=${PROJECT_NAME}"
            - "environment=prod"
            - "service=redis"
            - "cic.project=${PROJECT_NAME}"
            - "cic.env=prod"
            - "cic.service=redis"

        # Limites de ressources en production
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M
