# ============================================================================
# Docker Compose - Surcharge STAGING (Registry)
# ============================================================================
#
# USAGE:
#   ENV=staging docker-compose -f docker-compose.registry.yml -f docker-compose.staging-registry.yml up -d
#
# ============================================================================

services:
    __PROJECT_NAME__-api-__ENV__:
        ports:
            - "${STAGING_PORT:-8002}:80"

        environment:
            - ENVIRONMENT=staging
            - LOG_LEVEL=INFO
            - RELOAD=false

        labels:
            - "project=${PROJECT_NAME}"
            - "environment=staging"
            - "service=api"
            - "cic.project=${PROJECT_NAME}"
            - "cic.env=staging"
            - "cic.service=api"
            - "traefik.enable=true"
            - "traefik.http.routers.${PROJECT_NAME}-api-staging.rule=Host(`${STAGING_DOMAIN:-api.staging.localhost}`)"
            - "traefik.http.routers.${PROJECT_NAME}-api-staging.entrypoints=websecure"
            - "traefik.http.routers.${PROJECT_NAME}-api-staging.tls.certresolver=letsencrypt"
            - "traefik.http.services.${PROJECT_NAME}-api-staging.loadbalancer.server.port=80"

        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    __PROJECT_NAME__-redis-__ENV__:
        ports:
            - "${REDIS_STAGING_PORT:-6381}:6379"
        labels:
            - "project=${PROJECT_NAME}"
            - "environment=staging"
            - "service=redis"
            - "cic.project=${PROJECT_NAME}"
            - "cic.env=staging"
            - "cic.service=redis"

        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.25'
                    memory: 128M
