# ============================================================================
# Docker Compose - Configuration Registry
# Déploiement depuis Docker Hub ou autre registry
# ============================================================================
#
# USAGE:
#   Mode dev:
#     docker-compose -f docker-compose.registry.yml -f docker-compose.dev-registry.yml up -d
#
#   Avec script:
#     devops deploy-registry dev [version]
#
# VARIABLES REQUISES (injectées depuis .devops.yml):
#   - PROJECT_NAME, ENV, REGISTRY_URL, REGISTRY_USERNAME, IMAGE_NAME, IMAGE_TAG
#
# NOMMAGE: ${PROJECT_NAME}-{service}-${ENV}
#   Exemple: cicbi-api-backend-api-dev, cicbi-api-backend-redis-dev
#
# ============================================================================

services:
    __PROJECT_NAME__-api-__ENV__:
        # L'image sera définie via la variable IMAGE_FULL
        # Format: ${REGISTRY_URL}/${REGISTRY_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}
        # Exemple: docker.io/effijeanmermoz/cicbi-api-backend:dev-latest
        image: ${REGISTRY_URL}/${REGISTRY_USERNAME}/${IMAGE_NAME}:${ENV}-${IMAGE_TAG:-latest}
        container_name: __PROJECT_NAME__-api-__ENV__

        # Les ports seront surchargés dans les fichiers dev/prod

        # Variables d'environnement spécifiques à l'app
        # Note: L'application charge AUSSI le fichier .env.encrypted monté en volume
        # et déchiffre les valeurs sensibles en mémoire, écrasant celles de env_file
        env_file:
            - ../.env.${ENV}

        # Volumes pour le chiffrement des secrets
        volumes:
            # Monter la clé de chiffrement et le fichier chiffré (lecture seule)
            # Ces fichiers permettent le déchiffrement en mémoire au démarrage
            # Utilise des variables ENV_KEY_PATH et ENV_ENCRYPTED_PATH définies par le script
            - ../.env.key:/app/.env.key:ro
            - ../.env.${ENV}.encrypted:/app/.env.${ENV}.encrypted:ro

        # Redis dependency
        depends_on:
            __PROJECT_NAME__-redis-__ENV__:
                condition: service_healthy

        networks:
            - __PROJECT_NAME__-__ENV__-network

        restart: always

        labels:
            - "project=${PROJECT_NAME}"
            - "environment=${ENV}"
            - "service=api"
            - "image.source=registry"

        # Healthcheck
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    __PROJECT_NAME__-redis-__ENV__:
        image: redis:7-alpine
        container_name: __PROJECT_NAME__-redis-__ENV__

        # Les ports seront surchargés dans les fichiers dev/prod

        volumes:
            - __PROJECT_NAME__-redis-__ENV__-data:/data

        networks:
            - __PROJECT_NAME__-__ENV__-network

        restart: unless-stopped

        labels:
            - "project=${PROJECT_NAME}"
            - "environment=${ENV}"
            - "service=redis"

        command: redis-server --appendonly yes

        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    __PROJECT_NAME__-__ENV__-network:
        name: __PROJECT_NAME__-__ENV__-network
        driver: bridge

volumes:
    __PROJECT_NAME__-redis-__ENV__-data:
        driver: local
        name: __PROJECT_NAME__-redis-__ENV__-data

