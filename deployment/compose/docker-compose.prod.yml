# ============================================================================
# Docker Compose - Production Overrides (Build Local)
# ============================================================================
#
# USAGE:
#   ENV=prod docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# ============================================================================

services:
    __PROJECT_NAME__-api-__ENV__:
        ports:
            - "${PROD_PORT:-8000}:80"
        environment:
            - ENVIRONMENT=prod
            - LOG_LEVEL=INFO
            - WORKERS=4
        # La commande uvicorn est définie dans le Dockerfile avec APP_ENTRYPOINT
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 2G
                reservations:
                    cpus: '1.0'
                    memory: 1G
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${PROJECT_NAME}-api-prod.rule=Host(`${PROD_DOMAIN:-api.localhost}`)"
            - "traefik.http.services.${PROJECT_NAME}-api-prod.loadbalancer.server.port=80"
            - "traefik.http.routers.${PROJECT_NAME}-api-prod.tls=true"
            - "traefik.http.routers.${PROJECT_NAME}-api-prod.tls.certresolver=letsencrypt"

    __PROJECT_NAME__-redis-__ENV__:
        # Pas de port exposé en production (sécurité)
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M
