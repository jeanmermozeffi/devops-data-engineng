# ============================================================================
# Docker Compose - Development Overrides (Build Local)
# ============================================================================
#
# USAGE:
#   ENV=dev docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# ============================================================================

services:
    __PROJECT_NAME__-api-__ENV__:
        build:
            args:
                - ENABLE_RELOAD=true
        ports:
            - "${DEV_PORT:-8001}:80"
        environment:
            - ENVIRONMENT=dev
            - LOG_LEVEL=DEBUG
            - RELOAD=true
        # La commande uvicorn est définie dans le Dockerfile avec APP_ENTRYPOINT
        labels:
            - "traefik.enable=false"

    __PROJECT_NAME__-redis-__ENV__:
        ports:
            - "${REDIS_DEV_PORT:-6379}:6379"
