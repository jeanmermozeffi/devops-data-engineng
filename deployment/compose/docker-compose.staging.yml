# ============================================================================
# Docker Compose - Staging Overrides (Build Local)
# ============================================================================
#
# USAGE:
#   ENV=staging docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# ============================================================================

services:
    __PROJECT_NAME__-api-__ENV__:
        ports:
            - "${STAGING_PORT:-8002}:80"
        environment:
            - ENVIRONMENT=staging
            - LOG_LEVEL=INFO
            - WORKERS=2
        # La commande uvicorn est définie dans le Dockerfile avec APP_ENTRYPOINT
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${PROJECT_NAME}-api-staging.rule=Host(`${STAGING_DOMAIN:-api.staging.localhost}`)"
            - "traefik.http.services.${PROJECT_NAME}-api-staging.loadbalancer.server.port=80"

    __PROJECT_NAME__-redis-__ENV__:
        ports:
            - "${REDIS_STAGING_PORT:-6381}:6379"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

