services:
    api-staging:
        build:
            context: ../..
            dockerfile: ../docker/Dockerfile.staging
        image: ${IMAGE_NAME:-api}:staging-latest
        container_name: ${PROJECT_NAME:-app}-api-staging
        ports:
            - "${STAGING_PORT:-8002}:80"
        env_file:
            - .env.staging
        volumes:
            # Monter la clé de chiffrement et le fichier chiffré
            - ../.env.key:/app/.env.key:ro
            - ../.env.staging.encrypted:/app/.env.staging.encrypted:ro
        depends_on:
            - redis-staging
        networks:
            - staging-network
        restart: always
        labels:
            - "environment=staging"
            - "project=${PROJECT_NAME:-app}"
        # Pas de volume mount en staging pour éviter les modifications accidentelles
        # Le code est embarqué dans l'image lors du build

    redis-staging:
        image: redis:7-alpine
        container_name: ${PROJECT_NAME:-app}-redis-staging
        ports:
            - "${REDIS_STAGING_PORT:-6381}:6379"
        volumes:
            - redis-staging-data:/data
            - ../.docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
        networks:
            - staging-network
        restart: unless-stopped
        command: redis-server /usr/local/etc/redis/redis.conf
        labels:
            - "environment=staging"
            - "project=${PROJECT_NAME:-app}"

networks:
    staging-network:
        name: ${PROJECT_NAME:-app}-staging-network
        driver: bridge

volumes:
    redis-staging-data:
        driver: local
        name: ${PROJECT_NAME:-app}-redis-staging-data

